name: Update Biblioteca Episodes

on:
  schedule:
    # Runs daily at 06:00 UTC (03:00 Chile time)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-episodes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch latest episodes from YouTube
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/fetch-episodes.js

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/episodes.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new episodes found."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New episodes detected!"
          fi

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/episodes.json index.html sitemap.xml
          git commit -m "chore: update Biblioteca episodes ($(date -u +%Y-%m-%d))"
          git push
