name: Update Biblioteca Episodes

on:
  schedule:
    # Lunes 21:02 Chile → Martes 01:02 UTC
    - cron: '2 1 * * 2'
    # Martes 19:02 Chile → Martes 23:02 UTC
    - cron: '2 23 * * 2'
    # Miércoles 21:02 Chile → Jueves 01:02 UTC
    - cron: '2 1 * * 4'
    # Jueves 19:02 Chile → Jueves 23:02 UTC
    - cron: '2 23 * * 4'
    # Viernes 19:02 Chile → Viernes 23:02 UTC
    - cron: '2 23 * * 5'
    # Sábado 11:02 Chile → Sábado 15:02 UTC
    - cron: '2 15 * * 6'
    # Sábado 11:32 Chile → Sábado 15:32 UTC
    - cron: '32 15 * * 6'
    # Domingo 11:02 Chile → Domingo 15:02 UTC
    - cron: '2 15 * * 0'
    # Domingo 11:32 Chile → Domingo 15:32 UTC
    - cron: '32 15 * * 0'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-episodes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Fetch latest episodes from YouTube
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/fetch-episodes.js

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/episodes.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No new episodes found."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New episodes detected!"
          fi

      - name: Update cache busting version
        if: steps.changes.outputs.changed == 'true'
        run: |
          VERSION=$(date -u +%Y%m%d%H)
          sed -i "s/styles\.css?v=[0-9]*/styles.css?v=$VERSION/" index.html
          sed -i "s/main\.js?v=[0-9]*/main.js?v=$VERSION/" index.html

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/episodes.json index.html sitemap.xml
          git commit -m "chore: update Biblioteca episodes ($(date -u +%Y-%m-%d))"
          git push
